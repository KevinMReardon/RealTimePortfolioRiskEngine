services:
  postgres:
    image: postgres:16
    container_name: portfolio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: migrate/migrate:4
    container_name: portfolio-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres@postgres:5432/portfolio?sslmode=disable",
        "up"
      ]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    # Load OPENAI_* (and any other secrets) from a project-root `.env` file. Compose does
    # not read `.envrc`; `${VAR:-}` in `environment:` also forces empty strings and can
    # block other injection paths — use this file for Docker.
    env_file:
      - path: .env
        required: false
    environment:
      GIN_MODE: release
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/portfolio?sslmode=disable
      SHUTDOWN_TIMEOUT_SECONDS: "10"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data: